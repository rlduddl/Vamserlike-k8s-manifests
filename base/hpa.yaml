apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vamserlike-backend-hpa
  labels:
    app: vamserlike-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vamserlike-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

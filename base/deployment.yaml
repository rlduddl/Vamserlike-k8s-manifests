apiVersion: apps/v1
kind: Deployment
metadata:
  name: vamserlike-backend
  labels:
    app: vamserlike-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vamserlike-backend
  template:
    metadata:
      labels:
        app: vamserlike-backend
    spec:
      containers:
        - name: vamserlike-backend
          image: vamserlike-backend
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"

            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"

            - name: AWS__Region
              value: "ap-northeast-2"

            - name: Cognito__Region
              value: "ap-northeast-2"

            - name: Cognito__UserPoolId
              value: "ap-northeast-2_5wTvQXSQn"

            - name: Cognito__ClientId
              value: "13lnqkam2n6hqjis0lla7fe06d"

            - name: MySql__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: vamserlike-db-secret
                  key: connectionString

          readinessProbe:
            httpGet:
              path: /api/Health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/Health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"